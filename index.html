<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#274a36">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="熊鈴">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<title>熊鈴 - 加速度センサー連動ベル</title>
<style>
  :root{
    --bg:#12261c;
    --bg2:#0b1a13;
    --accent:#e8b84b;
    --accent2:#c98a2c;
    --fg:#f2ede1;
    --muted:#9db3a3;
    --ring-idle:#2c4a38;
    --ring-active:#e8b84b;
    --danger:#c0503c;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    background:radial-gradient(circle at 50% -10%, var(--bg) 0%, var(--bg2) 70%);
    color:var(--fg);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
    -webkit-tap-highlight-color:transparent;
    user-select:none;
  }
  header{
    text-align:center;
    margin-bottom:8px;
  }
  h1{
    font-size:20px;
    letter-spacing:.08em;
    margin:0 0 4px;
    font-weight:600;
  }
  .sub{
    font-size:12px;
    color:var(--muted);
    letter-spacing:.04em;
  }

  .stage{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    width:100%;
    max-width:420px;
  }

  .ring-wrap{
    position:relative;
    width:min(62vw, 260px);
    height:min(62vw, 260px);
    display:flex;
    align-items:center;
    justify-content:center;
    margin:18px 0 26px;
  }
  .pulse{
    position:absolute;
    inset:0;
    border-radius:50%;
    background:var(--ring-active);
    opacity:0;
    transform:scale(.7);
  }
  .pulse.fire{
    animation:pulseOut .55s ease-out;
  }
  @keyframes pulseOut{
    0%{opacity:.45; transform:scale(.7);}
    100%{opacity:0; transform:scale(1.25);}
  }
  .dial{
    position:relative;
    width:100%;
    height:100%;
    border-radius:50%;
    background:linear-gradient(160deg,#1c3a2a,#0e2118);
    border:2px solid var(--ring-idle);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    transition:border-color .15s, box-shadow .15s;
  }
  .dial.active{
    border-color:var(--ring-active);
    box-shadow:0 0 0 6px rgba(232,184,75,.12), 0 0 30px rgba(232,184,75,.15);
  }
  .dial.ringing{
    animation:ringPop .3s ease-out;
  }
  @keyframes ringPop{
    0%{transform:scale(1);}
    30%{transform:scale(1.04);}
    100%{transform:scale(1);}
  }
  .bell-icon{
    width:54px;
    height:54px;
    margin-bottom:10px;
    color:var(--muted);
    transform-origin:50% 15%;
    transition:color .15s;
  }
  .dial.active .bell-icon{ color:var(--accent); }
  .bell-icon.swing{
    animation:swing .35s ease-out;
  }
  @keyframes swing{
    0%{transform:rotate(0deg);}
    25%{transform:rotate(-14deg);}
    55%{transform:rotate(10deg);}
    80%{transform:rotate(-4deg);}
    100%{transform:rotate(0deg);}
  }
  .status-text{
    font-size:14px;
    font-weight:600;
    letter-spacing:.05em;
    color:var(--muted);
  }
  .dial.active .status-text{ color:var(--accent); }

  .meter{
    width:100%;
    max-width:280px;
    height:6px;
    border-radius:4px;
    background:rgba(255,255,255,.08);
    overflow:hidden;
    margin-bottom:22px;
  }
  .meter-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#5c8f6d,var(--accent));
    transition:width .08s linear;
  }

  .main-btn{
    width:100%;
    max-width:280px;
    padding:16px 20px;
    border-radius:16px;
    border:none;
    font-size:17px;
    font-weight:700;
    letter-spacing:.06em;
    cursor:pointer;
    background:var(--accent);
    color:#28210b;
    box-shadow:0 8px 20px rgba(232,184,75,.25);
    transition:transform .1s, background .15s;
  }
  .main-btn:active{ transform:scale(.97); }
  .main-btn.stop{
    background:var(--danger);
    color:#fff2ee;
    box-shadow:0 8px 20px rgba(192,80,60,.25);
  }
  .main-btn:disabled{
    opacity:.5;
    cursor:default;
    transform:none;
  }

  .panel{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,.035);
    border:1px solid rgba(255,255,255,.06);
    border-radius:18px;
    padding:18px 20px 8px;
    margin-top:22px;
  }
  .field{
    margin-bottom:16px;
  }
  .field-label{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    color:var(--muted);
    margin-bottom:8px;
  }
  .field-label b{
    color:var(--fg);
    font-weight:600;
  }
  input[type="range"]{
    -webkit-appearance:none;
    width:100%;
    height:4px;
    border-radius:4px;
    background:rgba(255,255,255,.15);
    outline:none;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:20px;
    height:20px;
    border-radius:50%;
    background:var(--accent);
    border:2px solid #12261c;
    cursor:pointer;
  }
  input[type="range"]::-moz-range-thumb{
    width:20px;
    height:20px;
    border-radius:50%;
    background:var(--accent);
    border:2px solid #12261c;
    cursor:pointer;
  }

  .msg{
    font-size:12.5px;
    line-height:1.7;
    color:var(--muted);
    text-align:center;
    max-width:340px;
    margin:16px auto 0;
  }
  .msg.error{
    color:#f0a48f;
  }
  .test-btn{
    width:100%;
    padding:10px;
    margin-top:2px;
    margin-bottom:14px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,.15);
    background:transparent;
    color:var(--fg);
    font-size:13px;
    cursor:pointer;
  }
  .test-btn:active{ background:rgba(255,255,255,.08); }

  footer{
    margin-top:26px;
    font-size:11px;
    color:#5f7469;
    text-align:center;
  }

  /* 定期鳴動のトグルスイッチ */
  .switch{
    position:relative;
    width:46px;
    height:26px;
    flex-shrink:0;
  }
  .switch input{
    opacity:0;
    width:100%;
    height:100%;
    margin:0;
    position:absolute;
    cursor:pointer;
    z-index:1;
  }
  .switch .track{
    position:absolute;
    inset:0;
    border-radius:13px;
    background:rgba(255,255,255,.15);
    transition:background .15s;
  }
  .switch .track::after{
    content:"";
    position:absolute;
    top:3px;
    left:3px;
    width:20px;
    height:20px;
    border-radius:50%;
    background:#cfd8d0;
    transition:transform .15s, background .15s;
  }
  .switch input:checked + .track{
    background:var(--accent2);
  }
  .switch input:checked + .track::after{
    transform:translateX(20px);
    background:#fff6e0;
  }
  .field-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  #intervalField{
    margin-top:14px;
  }
  #intervalField.hidden{ display:none; }

  /* 省電力の暗転オーバーレイ */
  .dim{
    position:fixed;
    inset:0;
    background:#000;
    z-index:50;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    opacity:0;
    pointer-events:none;
    transition:opacity .4s;
  }
  .dim.show{
    opacity:1;
    pointer-events:auto;
  }
  .dim .dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#3a3122;
    transition:background .1s;
  }
  .dim .dot.on{
    background:var(--accent);
  }
  .dim span{
    font-size:12px;
    color:#3d453f;
    letter-spacing:.1em;
  }
</style>
</head>
<body>

<header>
  <h1>熊鈴</h1>
  <div class="sub">加速度センサー連動ベル</div>
</header>

<div class="stage">
  <div class="ring-wrap">
    <div class="pulse" id="pulse"></div>
    <div class="dial" id="dial">
      <svg class="bell-icon" id="bellIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
        <path d="M12 3.2a1 1 0 0 1 1 1v.32A6.5 6.5 0 0 1 18.4 11v3.3l1.4 2.4a.6.6 0 0 1-.52.9H4.72a.6.6 0 0 1-.52-.9L5.6 14.3V11A6.5 6.5 0 0 1 11 4.52V4.2a1 1 0 0 1 1-1z" stroke-linejoin="round"/>
        <path d="M9.6 18.6a2.6 2.6 0 0 0 4.8 0" stroke-linecap="round"/>
      </svg>
      <div class="status-text" id="statusText">停止中</div>
    </div>
  </div>

  <div class="meter"><div class="meter-fill" id="meterFill"></div></div>

  <button class="main-btn" id="mainBtn">開始する</button>
  <div class="msg" id="msg">画面をオンにしたまま、ポケットやバッグに入れて使用してください。開始には端末の動きを検知する許可が必要です。</div>
</div>

<div class="panel">
  <div class="field">
    <div class="field-label"><span>感度</span><b id="sensLabel">中</b></div>
    <input type="range" id="sensitivity" min="1" max="9" step="1" value="5">
  </div>
  <div class="field">
    <div class="field-label"><span>音量</span><b id="volLabel">80%</b></div>
    <input type="range" id="volume" min="0" max="100" step="5" value="80">
  </div>
  <div class="field">
    <div class="field-row">
      <div>
        <div class="field-label" style="margin-bottom:2px;"><span>定期鳴動</span></div>
        <div style="font-size:11.5px; color:var(--muted);">静かな状態が続いたら自動で鳴らす</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="intervalToggle">
        <span class="track"></span>
      </label>
    </div>
    <div id="intervalField" class="hidden">
      <div class="field-label"><span>間隔</span><b id="intervalLabel">5秒</b></div>
      <input type="range" id="intervalSec" min="2" max="20" step="1" value="5">
    </div>
  </div>
  <button class="test-btn" id="testBtn">テスト再生</button>
</div>

<footer>通信不要・すべて端末内で動作します</footer>

<div class="dim" id="dimOverlay">
  <div class="dot" id="dimDot"></div>
  <span>検知中 — タップで戻る</span>
</div>

<script>
(() => {
  const dial = document.getElementById('dial');
  const pulse = document.getElementById('pulse');
  const bellIcon = document.getElementById('bellIcon');
  const statusText = document.getElementById('statusText');
  const meterFill = document.getElementById('meterFill');
  const mainBtn = document.getElementById('mainBtn');
  const testBtn = document.getElementById('testBtn');
  const msg = document.getElementById('msg');
  const sensSlider = document.getElementById('sensitivity');
  const sensLabel = document.getElementById('sensLabel');
  const volSlider = document.getElementById('volume');
  const volLabel = document.getElementById('volLabel');
  const intervalToggle = document.getElementById('intervalToggle');
  const intervalField = document.getElementById('intervalField');
  const intervalSlider = document.getElementById('intervalSec');
  const intervalLabel = document.getElementById('intervalLabel');
  const dimOverlay = document.getElementById('dimOverlay');
  const dimDot = document.getElementById('dimDot');

  const SENS_LABELS = {1:'とても弱い',2:'弱い',3:'弱め',4:'やや弱め',5:'中',6:'やや強め',7:'強め',8:'強い',9:'とても強い'};
  // sensitivity 1..9 -> threshold (m/s^2), higher sensitivity = lower threshold
  const sensToThreshold = v => {
    const min = 0.35, max = 3.2;
    const t = (9 - v) / 8; // 0 at v=9, 1 at v=1
    return min + t * (max - min);
  };

  // ---- 設定の保存・復元 ----
  const STORE_KEY = 'kumasuzu-settings';
  function loadSettings() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); }
    catch { return {}; }
  }
  function saveSettings() {
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify({
        sensitivity: Number(sensSlider.value),
        volume: Number(volSlider.value),
        intervalOn: intervalToggle.checked,
        intervalSec: Number(intervalSlider.value),
      }));
    } catch { /* private mode等で保存できなくても動作は続ける */ }
  }
  {
    const s = loadSettings();
    if (s.sensitivity >= 1 && s.sensitivity <= 9) sensSlider.value = s.sensitivity;
    if (s.volume >= 0 && s.volume <= 100) volSlider.value = s.volume;
    if (typeof s.intervalOn === 'boolean') intervalToggle.checked = s.intervalOn;
    if (s.intervalSec >= 2 && s.intervalSec <= 20) intervalSlider.value = s.intervalSec;
  }

  let threshold = sensToThreshold(Number(sensSlider.value));
  let volume = Number(volSlider.value) / 100;

  sensSlider.addEventListener('input', () => {
    sensLabel.textContent = SENS_LABELS[sensSlider.value];
    threshold = sensToThreshold(Number(sensSlider.value));
    saveSettings();
  });
  volSlider.addEventListener('input', () => {
    volLabel.textContent = volSlider.value + '%';
    volume = Number(volSlider.value) / 100;
    saveSettings();
  });
  function syncIntervalUI() {
    intervalField.classList.toggle('hidden', !intervalToggle.checked);
    intervalLabel.textContent = intervalSlider.value + '秒';
  }
  intervalToggle.addEventListener('change', () => { syncIntervalUI(); saveSettings(); });
  intervalSlider.addEventListener('input', () => { syncIntervalUI(); saveSettings(); });

  sensLabel.textContent = SENS_LABELS[sensSlider.value];
  volLabel.textContent = volSlider.value + '%';
  syncIntervalUI();

  // ---- Audio: synthesized bell (suzu) sound ----
  // 鈴 = 中の玉が殻に何度も当たる音。単発のチャイムではなく、
  // 高域の非整数倍音を持つ微小ストライクを短時間に重ねて「シャラーン」を作る。
  let audioCtx = null;
  let dryBus = null;
  let reverbBus = null;
  let noiseBuf = null;

  function makeImpulseResponse(ctx, seconds, decayPow) {
    const len = Math.floor(ctx.sampleRate * seconds);
    const buf = ctx.createBuffer(2, len, ctx.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      for (let i = 0; i < len; i++) {
        d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decayPow);
      }
    }
    return buf;
  }

  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      dryBus = audioCtx.createGain();
      dryBus.gain.value = 0.85;
      dryBus.connect(audioCtx.destination);

      // 短い残響で「シャラーン」の余韻を作る
      const convolver = audioCtx.createConvolver();
      convolver.buffer = makeImpulseResponse(audioCtx, 0.7, 3.5);
      reverbBus = audioCtx.createGain();
      reverbBus.gain.value = 0.5;
      reverbBus.connect(convolver);
      convolver.connect(audioCtx.destination);

      // 打撃音のアタック用ノイズ
      const nLen = Math.floor(audioCtx.sampleRate * 0.1);
      noiseBuf = audioCtx.createBuffer(1, nLen, audioCtx.sampleRate);
      const nd = noiseBuf.getChannelData(0);
      for (let i = 0; i < nLen; i++) nd[i] = Math.random() * 2 - 1;
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  // 1回の「チッ」= 玉が殻に当たる音。時刻はAudioContextの時計で指定。
  function strike(time, vel) {
    const ctx = audioCtx;
    const out = ctx.createGain();
    out.gain.value = vel;
    out.connect(dryBus);
    out.connect(reverbBus);

    // 殻の共鳴：非整数倍音（金属らしさ）。個体差として毎回わずかに揺らす
    const base = 3400 + Math.random() * 1600;
    const ratios = [1, 1.483, 2.106, 2.72];
    const peaks = [1, 0.55, 0.32, 0.18];
    ratios.forEach((ratio, i) => {
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = base * ratio * (1 + (Math.random() - 0.5) * 0.012);

      const g = ctx.createGain();
      // 高次ほど早く消える。基音だけ少し長く鳴らして芯を残す
      const decay = (i === 0 ? 0.22 : 0.05) + Math.random() * 0.06;
      g.gain.setValueAtTime(0, time);
      g.gain.linearRampToValueAtTime(peaks[i], time + 0.002);
      g.gain.exponentialRampToValueAtTime(0.0006, time + decay);

      osc.connect(g);
      g.connect(out);
      osc.start(time);
      osc.stop(time + decay + 0.05);
    });

    // アタックの「シュッ」: 帯域を絞ったノイズの一瞬
    const noise = ctx.createBufferSource();
    noise.buffer = noiseBuf;
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = base * 1.3;
    bp.Q.value = 1.2;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(0.5, time);
    ng.gain.exponentialRampToValueAtTime(0.001, time + 0.025);
    noise.connect(bp); bp.connect(ng); ng.connect(out);
    noise.start(time);
    noise.stop(time + 0.05);
  }

  function ringBell(intensity) {
    const ctx = ensureAudio();
    const t0 = ctx.currentTime;
    // 強く振るほど玉が多く当たる = ストライク数と密度を上げる
    const count = 3 + Math.round(intensity * 6);
    let t = t0;
    for (let i = 0; i < count; i++) {
      const fade = 1 - (i / count) * 0.55; // 後半は減衰
      const vel = (0.45 + Math.random() * 0.55) * (0.2 + intensity * 0.6) * fade * volume;
      strike(t, vel);
      t += 0.014 + Math.random() * 0.028;
    }
  }

  // ---- Visual feedback ----
  function flashRing(intensity) {
    pulse.classList.remove('fire');
    void pulse.offsetWidth;
    pulse.classList.add('fire');
    dial.classList.remove('ringing');
    void dial.offsetWidth;
    dial.classList.add('ringing');
    bellIcon.classList.remove('swing');
    void bellIcon.offsetWidth;
    bellIcon.classList.add('swing');
    if (dimOverlay.classList.contains('show')) {
      dimDot.classList.add('on');
      setTimeout(() => dimDot.classList.remove('on'), 150);
    }
  }

  // ---- 省電力: 検知中は一定時間で画面を暗転 ----
  const DIM_AFTER_MS = 20000;
  let dimTimer = null;
  function scheduleDim() {
    clearTimeout(dimTimer);
    if (running) dimTimer = setTimeout(() => dimOverlay.classList.add('show'), DIM_AFTER_MS);
  }
  function undim() {
    dimOverlay.classList.remove('show');
    scheduleDim();
  }
  dimOverlay.addEventListener('pointerdown', e => { e.preventDefault(); undim(); });
  document.addEventListener('pointerdown', () => { if (running) scheduleDim(); });

  // ---- 定期鳴動: 静かな時間が指定秒続いたら鳴らす ----
  let intervalTimer = null;
  function startIntervalLoop() {
    stopIntervalLoop();
    intervalTimer = setInterval(() => {
      if (!running || !intervalToggle.checked) return;
      const now = performance.now();
      if (now - lastRing > Number(intervalSlider.value) * 1000) {
        lastRing = now;
        ringBell(0.5);
        flashRing(0.5);
      }
    }, 400);
  }
  function stopIntervalLoop() {
    clearInterval(intervalTimer);
    intervalTimer = null;
  }

  // ---- Motion detection ----
  let running = false;
  let gravity = {x:0, y:0, z:0};
  let gravityInit = false;
  let lastRing = 0;
  let envelope = 0;       // 動きの強さの包絡線（アタック即時・リリース緩やか）
  let lastMag = 0;
  let wakeLock = null;

  function handleMotion(e) {
    let ax, ay, az;
    const lin = e.acceleration;
    const withG = e.accelerationIncludingGravity;

    if (lin && (lin.x !== null && lin.x !== undefined)) {
      ax = lin.x || 0; ay = lin.y || 0; az = lin.z || 0;
    } else if (withG && withG.x !== null && withG.x !== undefined) {
      const gx = withG.x || 0, gy = withG.y || 0, gz = withG.z || 0;
      if (!gravityInit) {
        gravity = {x:gx, y:gy, z:gz};
        gravityInit = true;
      }
      const alpha = 0.85;
      gravity.x = alpha * gravity.x + (1 - alpha) * gx;
      gravity.y = alpha * gravity.y + (1 - alpha) * gy;
      gravity.z = alpha * gravity.z + (1 - alpha) * gz;
      ax = gx - gravity.x;
      ay = gy - gravity.y;
      az = gz - gravity.z;
    } else {
      return;
    }

    let mag = Math.sqrt(ax*ax + ay*ay + az*az);

    // 回転（手首のひねり等）も揺れとして加味する。deg/s を m/s^2 相当に換算
    const rot = e.rotationRate;
    if (rot && rot.alpha !== null && rot.alpha !== undefined) {
      const rotMag = Math.sqrt(
        (rot.alpha||0)**2 + (rot.beta||0)**2 + (rot.gamma||0)**2
      ) / 90;
      mag += rotMag * 0.6;
    }

    // 加速度の変化分（ジャーク）を混ぜると、歩行の一歩ごとの衝撃を拾いやすい
    const jerk = Math.abs(mag - lastMag);
    lastMag = mag;
    const drive = mag * 0.7 + jerk * 0.8;

    // 包絡線: 立ち上がりは即時、減衰はゆっくり。これで判定と表示が滑らかになる
    envelope = Math.max(drive, envelope * 0.92);

    meterFill.style.width = Math.min(100, (envelope / (threshold * 1.6)) * 100) + '%';

    const now = performance.now();
    // 強く動くほど鳴る間隔が詰まる（実物の鈴の挙動に近づける）
    const over = envelope / threshold;
    const cooldown = over > 2 ? 130 : over > 1.4 ? 200 : 300;
    if (envelope > threshold && now - lastRing > cooldown) {
      lastRing = now;
      const intensity = Math.min(1, envelope / (threshold * 2.5));
      ringBell(intensity);
      flashRing(intensity);
    }
  }

  async function acquireWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
      }
    } catch (err) { /* ignore: not supported or denied */ }
  }
  document.addEventListener('visibilitychange', () => {
    if (running && document.visibilityState === 'visible') acquireWakeLock();
  });

  async function start() {
    mainBtn.disabled = true;
    msg.classList.remove('error');
    try {
      ensureAudio();
      // unlock audio with a silent tick (required by some mobile browsers)
      strike(audioCtx.currentTime, 0.0001);

      if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
        const perm = await DeviceMotionEvent.requestPermission();
        if (perm !== 'granted') {
          throw new Error('モーションセンサーの利用が許可されませんでした。設定アプリから許可してください。');
        }
      }

      if (!window.DeviceMotionEvent) {
        throw new Error('この端末・ブラウザは加速度センサーに対応していません。');
      }

      window.addEventListener('devicemotion', handleMotion);
      await acquireWakeLock();

      running = true;
      gravityInit = false;
      envelope = 0;
      lastMag = 0;
      lastRing = performance.now();
      startIntervalLoop();
      scheduleDim();
      dial.classList.add('active');
      statusText.textContent = '検知中';
      mainBtn.textContent = '停止する';
      mainBtn.classList.add('stop');
      msg.textContent = '動きを検知すると鈴が鳴ります。バックグラウンドでは動作しないため、画面を点けたままにしてください。';
    } catch (err) {
      msg.textContent = err.message || '開始できませんでした。';
      msg.classList.add('error');
    } finally {
      mainBtn.disabled = false;
    }
  }

  function stop() {
    running = false;
    stopIntervalLoop();
    clearTimeout(dimTimer);
    dimOverlay.classList.remove('show');
    window.removeEventListener('devicemotion', handleMotion);
    if (wakeLock) { wakeLock.release().catch(()=>{}); wakeLock = null; }
    dial.classList.remove('active');
    statusText.textContent = '停止中';
    meterFill.style.width = '0%';
    mainBtn.textContent = '開始する';
    mainBtn.classList.remove('stop');
    msg.classList.remove('error');
    msg.textContent = '画面をオンにしたまま、ポケットやバッグに入れて使用してください。開始には端末の動きを検知する許可が必要です。';
  }

  mainBtn.addEventListener('click', () => {
    if (running) stop(); else start();
  });

  testBtn.addEventListener('click', () => {
    ensureAudio();
    ringBell(0.8);
    flashRing(0.8);
  });

  // ---- PWA: オフライン動作用のService Worker ----
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
})();
</script>

</body>
</html>
